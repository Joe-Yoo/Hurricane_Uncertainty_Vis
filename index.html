<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hurricane Uncertainty Vis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="search-wrapper">
      <input type="text" id="search-bar" class="search-bar" placeholder="Search location..." autocomplete="off" />
      <ul id="suggestions" class="suggestions hidden"></ul>
    </div>
    <button id="search-btn" class="search-btn">Search</button>
    <button id="reset-btn" class="reset-btn">Reset</button>
    <div id="temp-toggle" class="mode-toggle-pill">
      <span class="pill-option active" data-mode="normal">Self-Select</span>
      <span class="pill-option" data-mode="temp">Within Radius</span>
    </div>
    <div class="radius-slider-wrap">
      <input type="range" id="radius-slider" min="50" max="2000" value="300" step="10" disabled />
      <span id="radius-label">300 km</span>
    </div>
    <label class="toggle-label">
      <input type="checkbox" id="barb-toggle" checked />
      Wind Barbs
    </label>
  </header>

  <div class="container">
    <section class="panel" id="left-panel">
      <div class="box">
        <h2>Left Section</h2>
        <div id="map-left" class="map-container"></div>
      </div>
    </section>

    <section class="panel" id="right-panel">
      <div class="box">
        <h2>Ensemble Detail</h2>
        <div id="map-right" class="map-container no-interact"></div>
      </div>
    </section>

    <aside class="settings-sidebar">
      <div class="settings-group">
        <h3>Map Layers</h3>
        <label class="control-item">
          <input type="checkbox" id="layer-paths" checked />
          Ensemble Paths
        </label>
        <label class="control-item">
          <input type="checkbox" id="layer-glyphs" checked />
          Wind Glyphs
        </label>
        <label class="control-item">
          <input type="checkbox" id="layer-currents" />
          Animated Currents
        </label>
      </div>

      <div class="settings-group">
        <h3>Glyph Style</h3>
        <div class="radio-group">
          <label>
            <input type="radio" name="glyph-style" value="barbs" checked />
            Wind Barbs
          </label>
          <label>
            <input type="radio" name="glyph-style" value="circles" />
            Simple Circles
          </label>
        </div>
      </div>

      <div class="settings-group">
        <h3>Glyph Properties</h3>
        <label class="control-item">
          <input type="checkbox" id="prop-temp" checked />
          Temperature Color
        </label>
        <label class="control-item">
          <input type="checkbox" id="prop-precip" />
          Precipitation Aura
        </label>
        <label class="control-item">
          <input type="checkbox" id="prop-labels" />
          Value Labels
        </label>
      </div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="main.js"></script>
</body>
</html>
