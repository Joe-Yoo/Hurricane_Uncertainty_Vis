<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hurricane Uncertainty Vis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="search-wrapper">
      <input type="text" id="search-bar" class="search-bar" placeholder="Search location..." autocomplete="off" />
      <ul id="suggestions" class="suggestions hidden"></ul>
    </div>
    <button id="search-btn" class="search-btn">Search</button>
    <button id="reset-btn" class="reset-btn">Reset</button>
    <div id="temp-toggle" class="mode-toggle-pill">
      <span class="pill-option active" data-mode="normal">Self-Select</span>
      <span class="pill-option" data-mode="temp">Within Radius</span>
    </div>
    <div class="radius-slider-wrap">
      <input type="range" id="radius-slider" min="50" max="2000" value="300" step="10" disabled />
      <span id="radius-label">300 km</span>
    </div>
    <label class="toggle-label">
      <input type="checkbox" id="barb-toggle" checked />
      Wind Barbs
    </label>
  </header>

  <div class="container">
    <section class="panel" id="left-panel">
      <div class="box">
        <h2>Left Section</h2>
        <div id="map-left" class="map-container"></div>
      </div>
    </section>

    <section class="panel" id="right-panel">
      <div class="box">
        <h2>Ensemble Detail</h2>
        <div id="map-right" class="map-container no-interact"></div>
      </div>
    </section>

    <aside class="settings-sidebar">
      <div class="settings-group">
        <h3>Map Layers</h3>

        <label class="control-item">
          <input type="checkbox" id="layer-glyphs" checked />
          Wind Glyphs
        </label>
        <label class="control-item">
          <input type="checkbox" id="layer-currents" />
          Animated Currents
        </label>
      </div>

      <div class="settings-group">
        <h3>Glyph Properties</h3>
        <label class="control-item">
          <input type="checkbox" id="prop-prox" checked />
          Eye Proximity Heatmap
        </label>
        <label class="control-item">
          <input type="checkbox" id="prop-icon" checked />
          Event Icons
        </label>
        <label class="control-item">
          <input type="checkbox" id="prop-barbs" checked />
          Wind Barbs
        </label>
      </div>

      <div class="settings-group legend-box">
        <h3>Legend</h3>
        
        <div class="legend-item">
          <div class="legend-color-scale" id="prox-color-scale" style="background: linear-gradient(to right, #d73027, #fc8d59, #fee090, #e0f3f8, #91bfdb, #4575b4);"></div>
          <div class="legend-labels">
            <span>Eye</span>
            <span>Dist (deg)</span>
            <span>Far</span>
          </div>
        </div>

        <div class="legend-item row">
          <svg width="24" height="24">
            <circle cx="12" cy="12" r="6" fill="#111"></circle>
            <text x="12" y="15" fill="#fff" font-size="10px" font-weight="bold" text-anchor="middle">+</text>
          </svg>
          <span>Eyewall Entry (+)</span>
        </div>

        <div class="legend-item row">
          <svg width="24" height="24">
            <circle cx="12" cy="12" r="6" fill="#111"></circle>
            <text x="12" y="15" fill="#fff" font-size="10px" font-weight="bold" text-anchor="middle">~</text>
          </svg>
          <span>Surge Risk (~)</span>
        </div>

        <div class="legend-item row">
          <svg width="24" height="24">
            <path d="M12,4 L12,20 M12,4 L18,5 L12,7" fill="none" stroke="#333" stroke-width="1.2"></path>
          </svg>
          <span>Wind Barb</span>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="main.js"></script>
</body>
</html>
