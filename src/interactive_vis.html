<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hurricane Uncertainty Vis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="search-wrapper">
      <input type="text" id="search-bar" class="search-bar" placeholder="Search location..." autocomplete="off" />
      <ul id="suggestions" class="suggestions hidden"></ul>
    </div>
    <button id="search-btn" class="search-btn">Search</button>
    <button id="reset-btn" class="reset-btn">Reset</button>
    <div id="temp-toggle" class="mode-toggle-pill">
      <span class="pill-option active" data-mode="normal">Self-Select</span>
      <span class="pill-option" data-mode="temp">Within Radius</span>
    </div>
    <div class="radius-slider-wrap">
      <input type="range" id="radius-slider" min="50" max="2000" value="300" step="10" disabled />
      <span id="radius-label">300 km</span>
    </div>
  </header>

  <div class="container">
    <section class="panel" id="left-panel">
      <div class="box">
        <div id="map-left" class="map-container"></div>
      </div>
    </section>

    <section class="panel" id="right-panel">
      <div class="box">
        <div id="map-right" class="map-container no-interact"></div>
      </div>
    </section>
  </div>

  <footer class="vis-footer">
    <a class="btn-prev" href="spaghetti_vis.html">Previous</a>
    <span class="footer-label">3 / 3</span>
    <a class="btn-next" href="conclusions.html">Next</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="main.js"></script>
</body>
</html>
